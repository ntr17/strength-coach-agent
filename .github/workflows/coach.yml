name: Coaching Pipeline

on:
  schedule:
    # 19:00 UTC = 20:00 Spain (CET) / 21:00 Spain (CEST)
    # Weekdays: evening protocol (plan check Telegram)
    # Sundays: weekly email + think pass
    - cron: '0 19 * * *'
    # 21:00 UTC — Sunday strategic pass + export (after weekly email is sent)
    - cron: '0 21 * * 0'
    # 22:00 UTC — daily close (V17: close_day + weekly_eval on Sundays)
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Override mode (evening-protocol, weekly, think, close-day, weekly-eval, monthly-eval). Leave blank for time-based routing.'
        required: false
        default: 'evening-protocol'

jobs:
  run-coach:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install optional Garmin dependency
        run: pip install "garminconnect>=0.2.22" || echo "garminconnect unavailable — Garmin sync disabled"

      - name: Write Google credentials
        env:
          GOOGLE_CREDENTIALS_B64: ${{ secrets.GOOGLE_CREDENTIALS_B64 }}
          GOOGLE_TOKEN_B64: ${{ secrets.GOOGLE_TOKEN_B64 }}
        run: |
          mkdir -p config
          echo "$GOOGLE_CREDENTIALS_B64" | base64 -d > config/credentials.json
          # Note: token.json must include gmail.readonly scope (re-auth locally if needed)
          echo "$GOOGLE_TOKEN_B64" | base64 -d > config/token.json

      - name: Evening protocol (weekdays) or weekly email (Sunday 19:00)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PROGRAM_SHEET_ID: ${{ secrets.PROGRAM_SHEET_ID }}
          MEMORY_SHEET_ID: ${{ secrets.MEMORY_SHEET_ID }}
          GMAIL_FROM: ${{ secrets.GMAIL_FROM }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
          ATHLETE_NAME: ${{ secrets.ATHLETE_NAME }}
          EMAIL_HOUR: ${{ secrets.EMAIL_HOUR }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          HOUR=$(date -u +%H)
          DAY=$(date +%u)  # 1=Mon ... 7=Sun
          MODE="${{ github.event.inputs.mode }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "$MODE" ]; then
            echo "Manual dispatch — running: $MODE"
            python src/run_coach.py --${MODE}
          elif [ "$DAY" = "7" ] && [ "$HOUR" = "19" ]; then
            echo "Sunday 19:00 UTC — running weekly coaching email..."
            python src/run_coach.py --weekly
          elif [ "$HOUR" = "19" ]; then
            echo "Weekday ${HOUR}:00 UTC — running evening protocol..."
            python src/run_coach.py --evening-protocol
          else
            echo "${HOUR}:00 UTC — Sunday strategic pass trigger (handled in next step)."
          fi

      - name: V17 Daily close + weekly eval (22:00 UTC daily)
        if: github.event_name == 'schedule'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PROGRAM_SHEET_ID: ${{ secrets.PROGRAM_SHEET_ID }}
          MEMORY_SHEET_ID: ${{ secrets.MEMORY_SHEET_ID }}
          GMAIL_FROM: ${{ secrets.GMAIL_FROM }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
          ATHLETE_NAME: ${{ secrets.ATHLETE_NAME }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          HOUR=$(date -u +%H)
          DAY=$(date +%u)
          if [ "$HOUR" = "22" ]; then
            echo "22:00 UTC — running close_day()..."
            python src/run_coach.py --close-day
            if [ "$DAY" = "7" ]; then
              echo "Sunday 22:00 UTC — also running weekly_eval()..."
              python src/run_coach.py --weekly-eval
            fi
          else
            echo "${HOUR}:00 UTC — skipping daily close."
          fi

      - name: Sunday strategic planning pass + export (21:00 UTC)
        if: github.event_name == 'schedule'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PROGRAM_SHEET_ID: ${{ secrets.PROGRAM_SHEET_ID }}
          MEMORY_SHEET_ID: ${{ secrets.MEMORY_SHEET_ID }}
          GMAIL_FROM: ${{ secrets.GMAIL_FROM }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
          ATHLETE_NAME: ${{ secrets.ATHLETE_NAME }}
          PROGRAM_START_DATE: ${{ secrets.PROGRAM_START_DATE }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Only run on Sundays at 21:00 UTC (day of week = 7)
          HOUR=$(date -u +%H)
          DAY=$(date +%u)
          if [ "$DAY" = "7" ] && [ "$HOUR" = "21" ]; then
            echo "Sunday 21:00 UTC — running strategic planning pass..."
            python src/run_coach.py --think
            echo "Sunday — exporting Coach Memory backup..."
            python src/run_coach.py --export
          else
            echo "Not Sunday 21:00 — skipping planning pass."
          fi
