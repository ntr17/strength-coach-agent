name: Proactive Check-in

on:
  schedule:
    - cron: '0 5 * * *'   # 07:00 CEST — Garmin sync (before brief)
    - cron: '0 6 * * *'   # 08:00 CEST — brief (Mon-Sat) or schedule discovery (Sun)
    - cron: '0 8 * * *'   # 10:00 CEST — morning proactive check
    - cron: '0 13 * * *'  # 15:00 CEST — post-session check-in
    - cron: '0 14 * * *'  # 16:00 CEST — afternoon proactive check
  workflow_dispatch:

jobs:
  proactive-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install optional Garmin dependency
        run: pip install "garminconnect>=0.2.22" || echo "garminconnect unavailable — Garmin sync disabled"

      - name: Write Google credentials
        env:
          GOOGLE_CREDENTIALS_B64: ${{ secrets.GOOGLE_CREDENTIALS_B64 }}
          GOOGLE_TOKEN_B64: ${{ secrets.GOOGLE_TOKEN_B64 }}
        run: |
          mkdir -p config
          echo "$GOOGLE_CREDENTIALS_B64" | base64 -d > config/credentials.json
          echo "$GOOGLE_TOKEN_B64" | base64 -d > config/token.json

      - name: Run brief / schedule discovery / proactive / post-session
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PROGRAM_SHEET_ID: ${{ secrets.PROGRAM_SHEET_ID }}
          MEMORY_SHEET_ID: ${{ secrets.MEMORY_SHEET_ID }}
          GMAIL_FROM: ${{ secrets.GMAIL_FROM }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        run: |
          HOUR=$(date -u +%H)
          DAY=$(date +%u)  # 1=Mon ... 7=Sun
          if [ "$HOUR" = "05" ]; then
            echo "05:00 UTC (07:00 CEST) — running Garmin sync..."
            python src/run_coach.py --sync-garmin
          elif [ "$HOUR" = "06" ] && [ "$DAY" = "7" ]; then
            echo "Sunday 06:00 UTC (08:00 CEST) — running weekly schedule discovery..."
            python src/run_coach.py --weekly-schedule
          elif [ "$HOUR" = "06" ]; then
            echo "06:00 UTC (08:00 CEST) — running pre-session brief..."
            python src/run_coach.py --brief
          elif [ "$HOUR" = "13" ]; then
            echo "13:00 UTC — running post-session check-in..."
            python src/run_coach.py --post-session
          else
            echo "${HOUR}:00 UTC — running proactive check-in..."
            python src/run_coach.py --proactive
          fi
